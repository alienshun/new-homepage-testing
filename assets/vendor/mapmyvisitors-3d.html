<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<base target="_blank">
<style>
  html,
  body {
    width: 100%;
    min-height: 460px;
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
  }

  body {
    box-sizing: border-box;
    padding: 10px;
    font-family: Georgia, "Times New Roman", serif;
    color: #6b5f52;
  }

  *,
  *::before,
  *::after {
    box-sizing: border-box;
  }

  #visitor-globe-root {
    width: 100%;
    min-height: 440px;
    display: grid;
    grid-template-columns: minmax(0, 1.12fr) minmax(280px, 0.88fr);
    gap: 14px;
    align-items: stretch;
  }

  .visitor-widget-panel {
    min-width: 0;
    min-height: 420px;
    padding: 12px;
    border: 1px solid rgba(140, 117, 92, 0.26);
    border-radius: 18px;
    background:
      radial-gradient(circle at 20% 10%, rgba(255, 255, 255, 0.18), transparent 28%),
      radial-gradient(circle at 80% 90%, rgba(122, 79, 42, 0.12), transparent 32%),
      rgba(255, 255, 255, 0.04);
    overflow: hidden;
  }

  .visitor-widget-title {
    margin: 0 0 8px;
    text-align: center;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.78;
  }

  .visitor-widget-slot {
    width: 100%;
    min-height: 370px;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .visitor-widget-slot a,
  .visitor-widget-slot img,
  .visitor-widget-slot canvas,
  .visitor-widget-slot svg,
  .visitor-widget-slot iframe,
  .visitor-widget-slot object {
    max-width: 100% !important;
  }

  .visitor-widget-slot img {
    height: auto !important;
    border: 0;
  }

  #visitor-map-slot {
    min-height: 340px;
  }

  @media (max-width: 820px) {
    html,
    body {
      min-height: 760px;
      overflow: hidden;
    }

    #visitor-globe-root {
      min-height: 740px;
      grid-template-columns: 1fr;
    }

    .visitor-widget-panel {
      min-height: 360px;
    }

    .visitor-widget-slot {
      min-height: 310px;
    }

    #visitor-map-slot {
      min-height: 300px;
    }
  }
</style>
</head>

<body>
  <div id="visitor-globe-root">
    <section class="visitor-widget-panel" aria-label="3D visitor globe">
      <div class="visitor-widget-title">3D Visitor Globe</div>
      <div class="visitor-widget-slot" id="visitor-globe-slot">
        <script
          type="text/javascript"
          id="mmvst_globe"
          src="https://mapmyvisitors.com/globe.js?d=jNfj9LXy7018FnpkzBkGWHCGbuvP2K3eOdP9csVmaDw"
        ></script>
      </div>
    </section>

    <section class="visitor-widget-panel" aria-label="2D visitor map">
      <div class="visitor-widget-title">Live Visitor Map</div>
      <div class="visitor-widget-slot" id="visitor-map-slot">
        <script
          type="text/javascript"
          id="mapmyvisitors"
          src="https://mapmyvisitors.com/map.js?d=lv35skyX2lbyweEWXclKdlDX6sBuXZH9CUyHouy4nk4&cl=ffffff&w=a"
        ></script>
      </div>
    </section>
  </div>
</body>
</html>
