<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<base target="_blank">
<style>
  html,
  body {
    width: 100%;
    min-height: 320px;
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Georgia, "Times New Roman", serif;
    color: #6b5f52;
  }

  a,
  img,
  canvas,
  svg,
  iframe,
  object {
    max-width: 100% !important;
  }

  img {
    height: auto !important;
    border: 0;
  }

  #cm-status {
    position: absolute;
    left: 50%;
    top: 50%;
    max-width: 86%;
    transform: translate(-50%, -50%);
    text-align: center;
    font-size: 15px;
    line-height: 1.55;
    opacity: 0.82;
  }

  body.is-loaded #cm-status {
    display: none;
  }

  body.is-fallback #cm-status {
    position: static;
    transform: none;
    padding: 16px;
  }

  body.is-fallback {
    padding: 12px;
    box-sizing: border-box;
  }

  .cm-fallback-link {
    color: #7a4f2a;
    font-weight: 700;
    text-decoration: none;
  }

  .cm-fallback-link:hover {
    text-decoration: underline;
  }
</style>
</head>

<body>
  <div id="cm-status">Loading visitor map...</div>

  <script>
    (function () {
      'use strict';

      var loaded = false;
      var fallbackShown = false;
      var checks = 0;
      var maxChecks = 24;
      var checkTimer = null;
      var fallbackTimer = null;

      function notify(state) {
        try {
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({
              type: 'stardust-clustrmaps-state',
              state: state
            }, '*');
          }
        } catch (e) {}
      }

      function getStatus() {
        return document.getElementById('cm-status');
      }

      function hasVisibleMapContent() {
        var nodes = document.body.querySelectorAll('img, canvas, svg, iframe, object');

        for (var i = 0; i < nodes.length; i += 1) {
          var node = nodes[i];

          if (node.id === 'clustrmaps') continue;
          if (node.id === 'cm-status') continue;

          var rect = node.getBoundingClientRect();

          if (rect.width > 24 && rect.height > 24) {
            return true;
          }
        }

        var linkedImages = document.body.querySelectorAll('a[href*="clustrmaps"] img');
        return linkedImages.length > 0;
      }

      function markLoaded() {
        if (loaded || fallbackShown) return;

        loaded = true;
        document.body.classList.add('is-loaded');
        document.body.classList.remove('is-fallback');

        if (checkTimer) {
          clearInterval(checkTimer);
          checkTimer = null;
        }

        if (fallbackTimer) {
          clearTimeout(fallbackTimer);
          fallbackTimer = null;
        }

        notify('loaded');
      }

      function showFallback() {
        if (loaded || fallbackShown) return;

        fallbackShown = true;

        if (checkTimer) {
          clearInterval(checkTimer);
          checkTimer = null;
        }

        var status = getStatus();

        document.body.classList.add('is-fallback');
        document.body.classList.remove('is-loaded');

        if (status) {
          status.innerHTML =
            '<div>Visitor map could not be loaded. It may be blocked by browser privacy settings or an extension.</div>' +
            '<div style="margin-top: 8px;">' +
            '<a class="cm-fallback-link" href="https://clustrmaps.com/" rel="noopener noreferrer">Open ClustrMaps</a>' +
            '</div>';
        }

        notify('fallback');
      }

      function checkMapContent() {
        checks += 1;

        if (hasVisibleMapContent()) {
          markLoaded();
          return;
        }

        if (checks >= maxChecks) {
          showFallback();
        }
      }

      var observer = new MutationObserver(function () {
        window.setTimeout(checkMapContent, 80);
      });

      try {
        observer.observe(document.documentElement, {
          childList: true,
          subtree: true,
          attributes: true
        });
      } catch (e) {}

      checkTimer = window.setInterval(checkMapContent, 300);
      fallbackTimer = window.setTimeout(showFallback, 8500);

      window.addEventListener('load', function () {
        window.setTimeout(checkMapContent, 300);
        window.setTimeout(checkMapContent, 900);
      });

      window.addEventListener('error', function (event) {
        if (event && event.target && event.target.id === 'clustrmaps') {
          window.setTimeout(showFallback, 600);
        }
      }, true);
    })();
  </script>

  <script
    type="text/javascript"
    id="clustrmaps"
    src="https://clustrmaps.com/map_v2.js?d=JNHdsUlsgFLa9cs6tAwlyymTImAhTyfKPyc_DG4MDX8&cl=ffffff&w=800"
  ></script>
</body>
</html>
