name: Generate index pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-index-pages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate index pages
        run: node scripts/generate_index_pages.js

      - name: Commit generated index pages
        run: |
          if git diff --quiet; then
            echo "No generated index page changes."
            exit 0
          fi

          git status --short

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "chore(index): regenerate index pages"
          git push
