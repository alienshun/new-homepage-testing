name: Generate Lossless WebP

on:
  push:
    branches:
      - main
    paths:
      - 'assets/**/*.png'
      - 'assets/**/*.jpg'
      - 'assets/**/*.jpeg'
      - 'assets/**/*.bmp'
      - 'assets/**/*.tif'
      - 'assets/**/*.tiff'
      - 'scripts/generate_lossless_webp.js'
      - '.github/workflows/generate-lossless-webp.yml'

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-lossless-webp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-lossless-webp:
    name: Generate lossless WebP sidecars
    runs-on: ubuntu-latest

    if: ${{ !contains(github.event.head_commit.message, '[skip webp]') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install WebP converter
        run: npm install --no-save --no-package-lock sharp

      - name: Generate lossless WebP files and manifest
        run: node scripts/generate_lossless_webp.js

      - name: Commit generated WebP files
        run: |
          if git diff --quiet -- assets; then
            echo "No WebP or manifest changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets
          git commit -m "chore: generate lossless webp [skip webp]"
          git push
